services:
  stash-extract-db:
    build: .
    container_name: stash-extract-db
    restart: unless-stopped
    ports:
      - "${BRIDGE_PORT:-13000}:13000"
    environment:
      STASH_URL: "${STASH_URL:-http://host.docker.internal:9999}"
      STASH_API_KEY: "${STASH_API_KEY:-}"
      STASH_SESSION_COOKIE: "${STASH_SESSION_COOKIE:-}"
      EXTRACTOR_URL: "${EXTRACTOR_URL:-http://extractor-gateway:12000}"
      DATA_DIR: "/data"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "${DATA_PATH:-./data}:/data"
    networks:
      - extractor_network

networks:
  extractor_network:
    name: ${DOCKER_NETWORK:-extractor_network}
    external: true
