services:
  stash-extract-db:
    build: .
    container_name: stash-extract-db
    restart: unless-stopped
    ports:
      - "${BRIDGE_PORT:-13000}:13000"
    environment:
      # Connection / auth
      STASH_URL: "${STASH_URL:-http://host.docker.internal:9999}"
      STASH_API_KEY: "${STASH_API_KEY:-}"
      STASH_SESSION_COOKIE: "${STASH_SESSION_COOKIE:-}"
      EXTRACTOR_URL: "${EXTRACTOR_URL:-http://extractor-gateway:12000}"
      DATA_DIR: "/data"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"

      # Lifecycle
      BRIDGE_LIFECYCLE_ENABLED: "${BRIDGE_LIFECYCLE_ENABLED:-true}"
      BRIDGE_NEW_SCORING_ENABLED: "${BRIDGE_NEW_SCORING_ENABLED:-true}"

      # Calibrated scoring (see docs/calibration/CALIBRATION_RESULTS.md)
      BRIDGE_HASH_ALGORITHM: "${BRIDGE_HASH_ALGORITHM:-phash}"
      BRIDGE_HASH_SIZE: "${BRIDGE_HASH_SIZE:-16}"
      BRIDGE_IMAGE_MODE: "${BRIDGE_IMAGE_MODE:-cover}"
      BRIDGE_IMAGE_THRESHOLD: "${BRIDGE_IMAGE_THRESHOLD:-0.7}"
      BRIDGE_SEARCH_LIMIT: "${BRIDGE_SEARCH_LIMIT:-5}"
      BRIDGE_SPRITE_SAMPLE_SIZE: "${BRIDGE_SPRITE_SAMPLE_SIZE:-8}"
      BRIDGE_IMAGE_GAMMA: "${BRIDGE_IMAGE_GAMMA:-3.5}"
      BRIDGE_IMAGE_COUNT_K: "${BRIDGE_IMAGE_COUNT_K:-0.25}"
      BRIDGE_IMAGE_MIN_CONTRIBUTION: "${BRIDGE_IMAGE_MIN_CONTRIBUTION:-0.05}"
      BRIDGE_IMAGE_BONUS_PER_EXTRA: "${BRIDGE_IMAGE_BONUS_PER_EXTRA:-0.1}"
      BRIDGE_IMAGE_CHANNELS: "${BRIDGE_IMAGE_CHANNELS:-phash,color_hist,tone}"
      BRIDGE_IMAGE_SEARCH_FLOOR: "${BRIDGE_IMAGE_SEARCH_FLOOR:-}"
      BRIDGE_FEATURIZE_UNIQUENESS_ALPHA: "${BRIDGE_FEATURIZE_UNIQUENESS_ALPHA:-1.0}"
      BRIDGE_FEATURIZE_UNIQUENESS_THRESHOLD: "${BRIDGE_FEATURIZE_UNIQUENESS_THRESHOLD:-0.85}"
      BRIDGE_FEATURIZE_UNIQUENESS_THRESHOLD_PHASH: "${BRIDGE_FEATURIZE_UNIQUENESS_THRESHOLD_PHASH:-}"
      BRIDGE_FEATURIZE_UNIQUENESS_THRESHOLD_TONE: "${BRIDGE_FEATURIZE_UNIQUENESS_THRESHOLD_TONE:-}"
      BRIDGE_FEATURIZE_UNIQUENESS_ALPHA_PHASH: "${BRIDGE_FEATURIZE_UNIQUENESS_ALPHA_PHASH:-}"
      BRIDGE_FEATURIZE_UNIQUENESS_ALPHA_TONE: "${BRIDGE_FEATURIZE_UNIQUENESS_ALPHA_TONE:-}"

      # Operational
      BRIDGE_FEATURIZE_CONCURRENCY: "${BRIDGE_FEATURIZE_CONCURRENCY:-4}"
      BRIDGE_FEATURIZE_PER_JOB_CONCURRENCY: "${BRIDGE_FEATURIZE_PER_JOB_CONCURRENCY:-8}"
      BRIDGE_STALE_TASK_MS: "${BRIDGE_STALE_TASK_MS:-600000}"
      BRIDGE_STASH_FEATURE_BUDGET_BYTES: "${BRIDGE_STASH_FEATURE_BUDGET_BYTES:-1073741824}"
      BRIDGE_LRU_EVICTION_INTERVAL_S: "${BRIDGE_LRU_EVICTION_INTERVAL_S:-3600}"
      BRIDGE_LEGACY_DUAL_WRITE_ENABLED: "${BRIDGE_LEGACY_DUAL_WRITE_ENABLED:-true}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "${DATA_PATH:-./data}:/data"
    networks:
      - extractor_network

networks:
  extractor_network:
    name: ${DOCKER_NETWORK:-extractor_network}
    external: true
